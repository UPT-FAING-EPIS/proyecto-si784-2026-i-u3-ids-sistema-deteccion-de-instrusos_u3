name: UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    name: Dashboard interface
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run UI tests
        run: |
          mkdir -p reports/ui-tests/screenshots reports/ui-tests/videos
          UI_SCREENSHOT_DIR=reports/ui-tests/screenshots UI_VIDEO_DIR=reports/ui-tests/videos \
            python -m pytest tests_ui -m ui

      - name: Upload UI evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-evidence
          path: |
            reports/ui-tests/screenshots
            reports/ui-tests/videos
