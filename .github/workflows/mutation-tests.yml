name: Mutation Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "43 7 * * 6"

permissions:
  contents: read

jobs:
  mutmut:
    name: Mutmut critical modules
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check baseline tests
        run: PYTHONPATH=src python -m pytest tests_mutation -x

      - name: Run mutation tests
        id: mutmut_run
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          rm -rf mutants
          mkdir -p reports/mutation
          mutmut run > reports/mutation/run.log 2>&1
          MUTMUT_EXIT_CODE=$?
          echo "exit_code=${MUTMUT_EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "Mutmut finished with exit code ${MUTMUT_EXIT_CODE}."
          exit 0

      - name: Annotate mutation report
        if: always()
        run: python scripts/emit_github_annotations.py mutation reports/mutation/run.log

      - name: Show mutation results
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mutmut results | tee reports/mutation/results.txt || true

      - name: Mutation testing summary
        if: always()
        run: |
          echo "Mutmut exit code: ${{ steps.mutmut_run.outputs.exit_code }}"
          echo "Exit code 0 means all evaluated mutants were killed."
          echo "Non-zero means review the mutation report; the workflow is kept green as an academic report job."

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation
