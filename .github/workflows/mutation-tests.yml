name: Mutation Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "43 7 * * 6"

permissions:
  contents: read

jobs:
  mutmut:
    name: Mutmut critical modules
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check baseline tests
        run: python -m pytest tests -m "not integration" -x

      - name: Run mutation tests
        id: mutmut_run
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          mutmut run
          MUTMUT_EXIT_CODE=$?
          echo "exit_code=${MUTMUT_EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "Mutmut finished with exit code ${MUTMUT_EXIT_CODE}."
          exit 0

      - name: Show mutation results
        if: always()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: mutmut results || true

      - name: Mutation testing summary
        if: always()
        run: |
          echo "Mutmut exit code: ${{ steps.mutmut_run.outputs.exit_code }}"
          echo "Exit code 0 means all evaluated mutants were killed."
          echo "Non-zero means review the mutation report; the workflow is kept green as an academic report job."
