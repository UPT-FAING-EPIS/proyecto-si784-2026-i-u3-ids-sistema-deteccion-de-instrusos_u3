name: Deploy QA Portal to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  build-reports:
    name: Generate and Deploy Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js for Snyk reports
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install "pytest-html>=4,<5" jinja2
          npm install -g snyk snyk-to-html || true

      - name: Create report directories
        run: |
          mkdir -p reports/unit-tests
          mkdir -p reports/coverage
          mkdir -p reports/bdd
          mkdir -p reports/ui-tests
          mkdir -p reports/mutation
          mkdir -p reports/semgrep
          mkdir -p reports/snyk
          touch reports/.nojekyll

      - name: Unit tests report
        run: |
          python -m pytest tests -m "not integration" --junitxml=reports/unit-tests/junit.xml --html=reports/unit-tests/pytest-report.html --self-contained-html || true
          python scripts/generate_qa_report_pages.py \
            --type unit \
            --title "Pruebas Unitarias - TrafficWatch IDS" \
            --description "Resultados de pruebas unitarias sobre modulos criticos del IDS: analisis de trafico, gestion de alertas, almacenamiento, utilidades de red y respuesta activa." \
            --junit reports/unit-tests/junit.xml \
            --raw-report pytest-report.html \
            --output reports/unit-tests/index.html

      - name: Coverage HTML report
        run: |
          python -m pytest tests -m "not integration" --cov=src --cov=web --cov-report=html:reports/coverage --cov-report=term > reports/coverage/coverage.txt 2>&1 || true
          if [ ! -f reports/coverage/index.html ]; then
            cat > reports/coverage/index.html <<'EOF'
          <!doctype html><html lang="es"><meta charset="utf-8"><title>Cobertura de Codigo</title><body><h1>Cobertura de Codigo</h1><p>No se pudo generar el reporte HTML de cobertura. Revisa el log incluido abajo.</p><pre>
          EOF
            cat reports/coverage/coverage.txt >> reports/coverage/index.html || true
            echo '</pre></body></html>' >> reports/coverage/index.html
          fi

      - name: BDD Behave report
        run: |
          python -m behave -f json.pretty -o reports/bdd/report.json features > reports/bdd/behave.txt 2>&1 || true
          python - <<'PY'
          import json
          from html import escape
          from pathlib import Path

          report_path = Path("reports/bdd/report.json")
          log_path = Path("reports/bdd/behave.txt")
          output_path = Path("reports/bdd/index.html")

          try:
              features = json.loads(report_path.read_text(encoding="utf-8")) if report_path.exists() else []
          except json.JSONDecodeError:
              features = []

          rows = []
          total = passed = failed = skipped = 0
          for feature in features:
              feature_name = feature.get("name", "Feature sin nombre")
              for element in feature.get("elements", []):
                  if element.get("type") != "scenario":
                      continue
                  total += 1
                  statuses = [
                      step.get("result", {}).get("status", "unknown")
                      for step in element.get("steps", [])
                  ]
                  if any(status == "failed" for status in statuses):
                      status = "failed"
                      failed += 1
                  elif statuses and all(status == "passed" for status in statuses):
                      status = "passed"
                      passed += 1
                  else:
                      status = "skipped"
                      skipped += 1

                  rows.append(
                      "<tr>"
                      f"<td>{escape(feature_name)}</td>"
                      f"<td>{escape(element.get('name', 'Escenario sin nombre'))}</td>"
                      f"<td class='{status}'>{escape(status)}</td>"
                      "</tr>"
                  )

          log_text = escape(log_path.read_text(encoding="utf-8", errors="replace")) if log_path.exists() else ""
          table_rows = "".join(rows) or '<tr><td colspan="3">No se encontraron escenarios en el reporte JSON.</td></tr>'
          html = f"""<!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Pruebas BDD - TrafficWatch IDS</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 32px; color: #172033; }}
              h1 {{ color: #0f5f8f; }}
              .summary {{ display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }}
              .metric {{ border: 1px solid #d6dde8; border-radius: 8px; padding: 12px 16px; min-width: 120px; }}
              .metric strong {{ display: block; font-size: 1.6rem; }}
              table {{ border-collapse: collapse; width: 100%; margin-top: 18px; }}
              th, td {{ border: 1px solid #d6dde8; padding: 10px; text-align: left; }}
              th {{ background: #eef4fb; }}
              .passed {{ color: #16803c; font-weight: bold; }}
              .failed {{ color: #b42318; font-weight: bold; }}
              .skipped {{ color: #8a5a00; font-weight: bold; }}
              pre {{ background: #f6f8fb; border: 1px solid #d6dde8; padding: 12px; overflow: auto; }}
            </style>
          </head>
          <body>
            <h1>Pruebas BDD (Behave)</h1>
            <p>Validacion de historias de usuario y criterios de aceptacion del dashboard.</p>
            <section class="summary">
              <div class="metric"><strong>{total}</strong>Total</div>
              <div class="metric"><strong>{passed}</strong>Aprobados</div>
              <div class="metric"><strong>{failed}</strong>Fallidos</div>
              <div class="metric"><strong>{skipped}</strong>Omitidos</div>
            </section>
            <table>
              <thead><tr><th>Feature</th><th>Escenario</th><th>Estado</th></tr></thead>
              <tbody>{table_rows}</tbody>
            </table>
            <h2>Salida de Behave</h2>
            <pre>{log_text}</pre>
          </body>
          </html>
          """
          output_path.write_text(html, encoding="utf-8")
          PY

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium || true

      - name: UI tests report
        run: |
          mkdir -p reports/ui-tests/screenshots
          UI_SCREENSHOT_DIR=reports/ui-tests/screenshots python -m pytest tests_ui -m ui --junitxml=reports/ui-tests/junit.xml --html=reports/ui-tests/pytest-report.html --self-contained-html || true
          python scripts/generate_qa_report_pages.py \
            --type ui \
            --title "Pruebas de Interfaz - TrafficWatch IDS" \
            --description "Validacion automatizada con Playwright sobre el dashboard principal y el laboratorio web controlado." \
            --junit reports/ui-tests/junit.xml \
            --raw-report pytest-report.html \
            --screenshots reports/ui-tests/screenshots \
            --output reports/ui-tests/index.html

      - name: Mutation tests report
        run: |
          rm -rf mutants
          mutmut run || true
          mutmut results > reports/mutation/results.txt || true
          python scripts/generate_qa_report_pages.py \
            --type mutation \
            --results reports/mutation/results.txt \
            --output reports/mutation/index.html

      - name: Semgrep security report
        run: |
          python -m pip install semgrep || true
          semgrep scan --config auto --json --output reports/semgrep/semgrep.json || true
          python - <<'PY'
          import json
          from html import escape
          from pathlib import Path

          report_path = Path("reports/semgrep/semgrep.json")
          output_path = Path("reports/semgrep/index.html")
          try:
              data = json.loads(report_path.read_text(encoding="utf-8")) if report_path.exists() else {}
          except json.JSONDecodeError:
              data = {}
          results = data.get("results", [])

          rows = []
          for item in results:
              extra = item.get("extra", {})
              rows.append(
                  "<tr>"
                  f"<td>{escape(item.get('path', ''))}</td>"
                  f"<td>{escape(str(item.get('start', {}).get('line', '')))}</td>"
                  f"<td>{escape(extra.get('severity', 'INFO'))}</td>"
                  f"<td>{escape(extra.get('message', ''))}</td>"
                  "</tr>"
              )

          table_rows = "".join(rows) or '<tr><td colspan="4">Semgrep no reporto hallazgos o no genero resultados.</td></tr>'
          html = f"""<!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Semgrep - TrafficWatch IDS</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 32px; color: #172033; }}
              h1 {{ color: #0f5f8f; }}
              table {{ border-collapse: collapse; width: 100%; margin-top: 18px; }}
              th, td {{ border: 1px solid #d6dde8; padding: 10px; text-align: left; vertical-align: top; }}
              th {{ background: #eef4fb; }}
            </style>
          </head>
          <body>
            <h1>Analisis Estatico Semgrep</h1>
            <p>Hallazgos detectados: <strong>{len(results)}</strong></p>
            <table>
              <thead><tr><th>Archivo</th><th>Linea</th><th>Severidad</th><th>Mensaje</th></tr></thead>
              <tbody>{table_rows}</tbody>
            </table>
          </body>
          </html>
          """
          output_path.write_text(html, encoding="utf-8")
          PY

      - name: Snyk vulnerability report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            snyk test --file=requirements.txt --json | snyk-to-html -o reports/snyk/dependencies.html || true
            snyk code test --json | snyk-to-html -o reports/snyk/code.html || true
          else
            echo "SNYK_TOKEN no configurado. Se omite el reporte de Snyk."
            echo "<h3>Snyk no configurado</h3><p>Registra el SNYK_TOKEN en tus GitHub Secrets para habilitar este reporte.</p>" > reports/snyk/dependencies.html
          fi
          if [ ! -f reports/snyk/dependencies.html ]; then
            echo "<h3>Snyk dependencias</h3><p>No se pudo generar el reporte de dependencias.</p>" > reports/snyk/dependencies.html
          fi
          if [ ! -f reports/snyk/code.html ]; then
            echo "<h3>Snyk Code</h3><p>No se pudo generar el reporte de codigo o SNYK_TOKEN no esta configurado.</p>" > reports/snyk/code.html
          fi

      - name: Generate QA Portal index.html
        run: |
          cat << 'EOF' > reports/index.html
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>QA & Security Portal - TrafficWatch IDS</title>
              <style>
                  body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 40px; }
                  h1 { color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 15px; }
                  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
                  .card { background-color: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; transition: transform 0.2s; }
                  .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
                  .card h3 { color: #f1f5f9; margin-top: 0; }
                  .card p { color: #94a3b8; font-size: 0.9em; line-height: 1.5; }
                  .btn { display: inline-block; background-color: #0284c7; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-top: 10px; }
                  .btn:hover { background-color: #0369a1; }
              </style>
          </head>
          <body>
              <h1>TrafficWatch IDS - Portal de Reportes QA y Seguridad</h1>
              <p>Resultados acumulados de pruebas y escaneos de seguridad generados en la ultima ejecucion de CI/CD.</p>

              <div class="grid">
                  <div class="card">
                      <h3>Pruebas Unitarias</h3>
                      <p>Resumen academico y detalle pytest-html de pruebas sobre modulos criticos del IDS.</p>
                      <a href="./unit-tests/index.html" class="btn">Ver Reporte</a>
                  </div>
                  <div class="card">
                      <h3>Cobertura de Codigo</h3>
                      <p>Porcentaje de lineas de codigo evaluadas por las pruebas unitarias.</p>
                      <a href="./coverage/index.html" class="btn">Ver Cobertura</a>
                  </div>
                  <div class="card">
                      <h3>Pruebas BDD (Behave)</h3>
                      <p>Validacion de historias de usuario y criterios de aceptacion con Behave.</p>
                      <a href="./bdd/index.html" class="btn">Ver Escenarios</a>
                  </div>
                  <div class="card">
                      <h3>Pruebas de Interfaz (Playwright)</h3>
                      <p>Validacion del dashboard y laboratorio web con evidencia visual automatizada.</p>
                      <a href="./ui-tests/index.html" class="btn">Ver Pruebas UI</a>
                  </div>
                  <div class="card">
                      <h3>Pruebas de Mutacion</h3>
                      <p>Resumen de mutantes generados, evaluados, eliminados y sobrevivientes.</p>
                      <a href="./mutation/index.html" class="btn">Ver Reporte</a>
                  </div>
                  <div class="card">
                      <h3>Seguridad - Snyk</h3>
                      <p>Reportes de vulnerabilidades detectadas en dependencias de Python.</p>
                      <a href="./snyk/dependencies.html" class="btn">Ver Dependencias</a>
                  </div>
                  <div class="card">
                      <h3>Seguridad - Semgrep</h3>
                      <p>Analisis estatico de codigo fuente con reglas de seguridad y calidad.</p>
                      <a href="./semgrep/index.html" class="btn">Ver Semgrep</a>
                  </div>
              </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages
