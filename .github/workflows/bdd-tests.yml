name: BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  behave:
    name: Behave scenarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run BDD scenarios
        run: |
          mkdir -p reports/bdd
          set +e
          python -m behave -f json.pretty -o reports/bdd/report.json features
          BEHAVE_EXIT_CODE=$?
          python scripts/emit_github_annotations.py bdd reports/bdd/report.json
          exit $BEHAVE_EXIT_CODE

      - name: Upload BDD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-json-report
          path: reports/bdd/report.json
